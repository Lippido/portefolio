<div class="animated-background">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
</div>

<nav class="navbar" [class.sticky]="true">
  <div class="nav-container">
    <a routerLink="/" class="nav-brand">Mon Portfolio</a>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="isMenuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" [class.open]="isMenuOpen()">
      <li><a routerLink="/presentation" routerLinkActive="active" (click)="closeMenu()">Présentation</a></li>
      <li><a routerLink="/skills" routerLinkActive="active" (click)="closeMenu()">Compétences</a></li>
      <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projets</a></li>
      <li><a href="CV.pdf" download (click)="closeMenu()">Télécharger CV</a></li>
    </ul>

    <button class="theme-toggle" (click)="themeService.toggleTheme()" title="Toggle theme">
      <span *ngIf="!themeService.isDarkMode()">🌙</span>
      <span *ngIf="themeService.isDarkMode()">☀️</span>
    </button>
  </div>
</nav>

<main class="content">
  <router-outlet></router-outlet>
</main>
